name: Deploy to Cloudflare Pages

on:
  schedule:
    - cron: '0 */5 * * *' # 每 5 小时执行一次

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 其他构建步骤（如果需要）例如 npm install, npm run build 等

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # 可选，但推荐
          projectName: notionnext    #你的 Cloudflare Pages 项目名称
